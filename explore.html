<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explore — Blake R. Buchanan</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --col: 860px;
      --gap: 2rem;
      --fg: #111;
      --muted: #666;
      --link: #111;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.65;
      color: var(--fg);
      background: #fff;
      padding: 0 var(--gap);
    }

    header, main, footer {
      max-width: var(--col);
      margin: 0 auto;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 3rem 0;
      border-bottom: 1px solid #e8e8e8;
    }

    .header-identity {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .header-name-group {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.25rem;
    }

    .header-avatar {
      width: 128px;
      height: 128px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }

    header .name {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      text-decoration: none;
      color: var(--fg);
    }

    nav { display: flex; gap: 1.5rem; }

    .social-links { display: flex; gap: 1.5rem; }

    nav a, .social-links a {
      font-size: 0.9rem;
      color: var(--muted);
      text-decoration: none;
    }

    nav a:hover, .social-links a:hover { color: var(--fg); }
    nav a.active { color: var(--fg); }

    main { padding: 3rem 0; }

    section { margin-bottom: 3.5rem; }
    section:last-child { margin-bottom: 0; }

    h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    /* ── Slider ── */
    .slider {
      position: relative;
      width: 100%;
      aspect-ratio: 3 / 2;
      overflow: hidden;
      background: #f0f0f0;
    }

    .slider img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .slider img.visible { display: block; }

    .slider-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.75);
      border: none;
      cursor: pointer;
      padding: 0.5rem 0.75rem;
      font-size: 1rem;
      color: var(--fg);
      z-index: 1;
      font-family: inherit;
    }

    .slider-btn:hover { background: rgba(255,255,255,0.95); }
    .slider-btn.prev { left: 0.5rem; }
    .slider-btn.next { right: 0.5rem; }

    footer {
      padding: 2.5rem 0;
      border-top: 1px solid #e8e8e8;
      font-size: 0.8rem;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--fg); }

    @media (max-width: 480px) {
      header { flex-direction: column; gap: 1rem; }
      nav { flex-wrap: wrap; gap: 1rem; }
      footer { flex-direction: column; gap: 0.5rem; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-identity">
      <img class="header-avatar" src="assets/imgs/me.jpg" alt="Blake Buchanan">
      <div class="header-name-group">
        <a class="name" href="index.html">Blake R. Buchanan</a>
        <div class="social-links">
          <a href="mailto:blakerbuchanan@gmail.com">Email</a>
          <a href="https://github.com/blakerbuchanan" target="_blank" rel="noopener noreferrer">GitHub</a>
          <a href="https://www.linkedin.com/in/blakerbuchanan/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
        </div>
      </div>
    </div>
    <nav>
      <a href="index.html">About</a>
      <a href="research.html">Research</a>
      <a href="viewable/Blake_Buchanan_Resume.pdf" target="_blank" rel="noopener noreferrer">CV</a>
      <a href="explore.html" class="active">Explore</a>
    </nav>
  </header>

  <main>

    <section>
      <h2>Great Smoky Mountains</h2>
      <div class="slider" id="gsm">
        <img src="viewable/slider/gsm1.jpg" class="visible">
        <img src="viewable/slider/gsm2.jpg">
        <img src="viewable/slider/gsm3.jpg">
        <img src="viewable/slider/gsm4.jpg">
        <button class="slider-btn prev" onclick="slide('gsm', -1)">&#10094;</button>
        <button class="slider-btn next" onclick="slide('gsm', 1)">&#10095;</button>
      </div>
    </section>

    <section>
      <h2>Grand Canyon and Zion National Park</h2>
      <div class="slider" id="gc">
        <img src="viewable/slider/gc1.jpg" class="visible">
        <img src="viewable/slider/gc2.jpg">
        <img src="viewable/slider/gc3.jpg">
        <img src="viewable/slider/gc4.jpg">
        <img src="viewable/slider/gc5.jpg">
        <img src="viewable/slider/gc6.jpg">
        <img src="viewable/slider/gc7.jpg">
        <button class="slider-btn prev" onclick="slide('gc', -1)">&#10094;</button>
        <button class="slider-btn next" onclick="slide('gc', 1)">&#10095;</button>
      </div>
    </section>

  </main>

  <footer>
    <span>Boston, MA</span>
    <span>
      <a href="mailto:blakerbuchanan@gmail.com">email</a> &nbsp;·&nbsp;
      <a href="https://github.com/blakerbuchanan">github</a> &nbsp;·&nbsp;
      <a href="https://www.linkedin.com/in/blakerbuchanan/">linkedin</a>
    </span>
  </footer>

  <script>
    const indices = {};

    function slide(id, dir) {
      const slider = document.getElementById(id);
      const imgs = slider.querySelectorAll('img');
      if (!indices[id]) indices[id] = 0;
      imgs[indices[id]].classList.remove('visible');
      indices[id] = (indices[id] + dir + imgs.length) % imgs.length;
      imgs[indices[id]].classList.add('visible');
    }
  </script>

</body>
</html>
